<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 150px; padding: 10px; font-family: sans-serif; }
    input { width: 100%; cursor: pointer; }
    span { display: block; text-align: center; margin-bottom: 5px; }
  </style>
</head>
<body>
  <span>Volume: <b id="val">50%</b></span>
  <input type="range" id="volumeSlider" min="0" max="100" value="50">
  
  <hr>
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <small>Controles:</small>
    <button id="toggleControles">Ativado</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
